- hosts: all
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Create Instance - without nics
      ganeti.cli.gnt_instance:
        name: create_no_nics_instance_1
        state: present
        params:
          disk-template: file
          disk:
            - size: 10G
          os-type: noop
          name-check: False
          ip-check: False
          hypervisor: fake
      tags:
        - create
    - name: Modify Instance - with nics
      ganeti.cli.gnt_instance:
        name: create_no_nics_instance_2
        state: present
        params:
          disk-template: file
          disk:
            - size: 10G
          os-type: noop
          name-check: False
          ip-check: False
          hypervisor: fake
      tags:
        - create
    - name: Modify Instance - without nics
      ganeti.cli.gnt_instance:
        name: create_no_nics_instance_2
        state: present
        params:
          disk-template: file
          disk:
            - size: 10G
          os-type: noop
          name-check: False
          ip-check: False
          hypervisor: fake
      tags:
        - modify
